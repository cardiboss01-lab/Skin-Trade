<section class="booking-hero">
    <div class="booking-hero-content">
        <h1>BOOK A CONSULTATION</h1>
        <p>
            Tell us about your tattoo idea and we'll contact you.
        </p>
    </div>
</section>

<section class="booking-section">

    <div class="booking-container">

        <form class="booking-form">

            <div class="form-group">
                <label>Full Name</label>
                <input type="text" required>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" required>
            </div>

            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" required>
            </div>

            <div class="form-group">
                <label>Tattoo Style</label>
                <select>
                    <option>Custom And Flash Tattoo </option>
                    <option>Designs</option>
                    <option>Glow In The Dark Tattoos</option>
                    <option>Full Color Tattoos</option>
                    <option>Cover-Ups</option>
                    <option>Piercings</option>
                    <option>Body Jewelry</option>
                    <option>Black And Gray Tattoos</option>
                </select>
            </div>

            <div class="form-group">
                <label>Placement</label>
                <input type="text">
            </div>

            <div class="form-group">
                <label>Approximate Size</label>
                <input type="text">
            </div>

            <div class="form-group full-width">
                <label>Description</label>
                <textarea rows="6"></textarea>
            </div>

            <div class="form-group">
                <label>Preferred Date</label>
                <input type="date">
            </div>


            <div class="form-group full-width">
                <button type="submit" class="btn-primary">
                    Submit Request
                </button>
            </div>

        </form>

    </div>

</section>
